<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion Parents / Élèves</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Connexion à l'espace Parents / Élèves</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Mot de passe"><br><br>

<button onclick="login()">Se connecter</button>

<p id="msg"></p>

<script type="module">
import { auth } from "./firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "dashboard.html";
    })
    .catch(() => {
      document.getElementById("msg").innerText = "Email ou mot de passe incorrect";
    });
}
</script>

</body>
</html>
